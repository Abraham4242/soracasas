<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sora Casas · Enciclopedia de Materiales</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0f2218">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231d3a2c'/%3E%3Cpath d='M7 18 L16 10 L25 18 L25 25 L7 25 Z' fill='%23f7f0df'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Instrument+Serif&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f5f1e7;--surface:#fffdf8;--surface-2:#faf5ea;--surface-3:#f1ebdc;
    --fg:#1b1813;--fg-2:#46413a;--muted:#857d6e;--faint:#b3aa98;
    --border:rgba(20,17,12,.09);--border-2:rgba(20,17,12,.15);--border-3:rgba(20,17,12,.26);
    --forest:#1d3a2c;--forest-2:#2a5440;--forest-deep:#0f2218;
    --accent:#d8694a;--accent-2:#c2613f;--accent-soft:rgba(216,105,74,.10);
    --good:#3f7d52;--good-soft:rgba(63,125,82,.12);--warn:#b98a2e;--warn-soft:rgba(185,138,46,.13);--info:#3c6e7a;--info-soft:rgba(60,110,122,.12);
    --sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;--mono:"JetBrains Mono",ui-monospace,Menlo,monospace;--serif:"Fraunces",Georgia,serif;--display:"Instrument Serif",Georgia,serif;
    --r6:6px;--r8:8px;--r10:10px;--r12:12px;--r14:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
  button,input,textarea{font:inherit;color:inherit}button{cursor:pointer;border:none;background:none}::selection{background:var(--forest);color:#fff}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:6px;border:2px solid var(--bg)}
  /* LOGIN (same gate as the internal tool) */
  #login{position:fixed;inset:0;z-index:200;background:var(--forest-deep);display:flex;align-items:center;justify-content:center;padding:24px;background-image:radial-gradient(ellipse at 20% 10%,rgba(216,105,74,.10),transparent 55%),radial-gradient(ellipse at 85% 90%,rgba(42,84,64,.5),transparent 60%)}
  #login.hide{display:none}
  .lcard{width:100%;max-width:368px;background:rgba(255,253,248,.04);border:1px solid rgba(255,255,255,.10);border-radius:var(--r12);padding:30px 28px;text-align:center;backdrop-filter:blur(8px)}
  .lmark{width:42px;height:42px;border-radius:10px;background:var(--forest-2);display:grid;place-items:center;margin:0 auto 18px}
  .lword{font-family:var(--display);font-size:30px;color:#fdfbf4;line-height:1}.lsub{font-family:var(--mono);font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--accent);margin-top:8px;margin-bottom:24px}
  #login input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:var(--r8);padding:11px 13px;color:#fff;font-size:13.5px;text-align:center;letter-spacing:.5px}#login input:focus{outline:none;border-color:var(--accent)}
  #login button{width:100%;margin-top:11px;background:var(--accent);color:#fff;font-weight:600;font-size:12px;letter-spacing:.4px;padding:12px;border-radius:var(--r8);transition:.15s}#login button:hover{background:var(--accent-2)}
  .lhint{margin-top:16px;font-family:var(--mono);font-size:10px;color:#7d8c80;letter-spacing:.3px}.lerr{color:#e89b85;font-size:11.5px;margin-top:10px;min-height:14px}
  /* SHELL */
  #app{display:none}#app.show{display:block}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(245,241,231,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .topbar-in{max-width:1360px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:16px}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;font-weight:500;flex:0 0 auto}.back:hover{color:var(--fg)}.back svg{width:14px;height:14px}
  .brandmark{width:26px;height:26px;border-radius:7px;background:var(--forest);display:grid;place-items:center;flex:0 0 auto}
  .ttl{font-family:var(--display);font-size:20px;color:var(--fg);line-height:1;flex:0 0 auto}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r8);padding:8px 12px;width:280px;color:var(--muted)}.search:focus-within{border-color:var(--border-3)}.search input{border:none;background:none;flex:1;font-size:12.5px;color:var(--fg)}.search input:focus{outline:none}.search svg{width:15px;height:15px;flex:0 0 auto}
  .i18nslot{display:flex;border:1px solid var(--border-2);border-radius:var(--r8);overflow:hidden;flex:0 0 auto}
  .i18nslot button{font-family:var(--mono);font-size:10px;font-weight:600;padding:7px 10px;color:var(--muted);letter-spacing:1px}
  .i18nslot button.on{background:var(--forest);color:#f1ece0}
  .filterbar{position:sticky;top:57px;z-index:29;background:rgba(245,241,231,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .filterbar-in{max-width:1360px;margin:0 auto;padding:12px 28px;display:flex;flex-direction:column;gap:8px}
  .tabs{display:flex;gap:5px;flex-wrap:wrap;align-items:center}.tab{font-size:11.5px;font-weight:500;color:var(--fg-2);padding:6px 12px;border-radius:99px;border:1px solid transparent;transition:.12s;display:inline-flex;gap:6px;align-items:center}.tab:hover{background:var(--surface-2)}.tab.on{background:var(--forest);color:#f1ece0}.tab .n{font-family:var(--mono);font-size:10px;opacity:.7}
  .content{max-width:1360px;margin:0 auto;padding:26px 28px 60px}
  .hero{margin-bottom:22px}.hero h1{font-family:var(--serif);font-weight:500;font-size:27px;letter-spacing:-.01em}.hero h1 em{font-style:italic;color:var(--forest)}.hero p{color:var(--muted);font-size:13px;margin-top:4px}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:16px;transition:.14s;cursor:pointer;text-align:left;display:flex;flex-direction:column}
  .mcard:hover{border-color:var(--border-3);transform:translateY(-1px);box-shadow:0 6px 20px rgba(20,17,12,.06)}
  .mcard .mh{display:flex;align-items:flex-start;gap:11px}
  .mcard .sw{width:40px;height:40px;border-radius:var(--r10);flex:0 0 auto;border:1px solid var(--border-2)}
  .mcard .ic{width:40px;height:40px;border-radius:var(--r10);background:var(--surface-3);display:grid;place-items:center;flex:0 0 auto;color:var(--forest)}.mcard .ic svg{width:19px;height:19px}
  .mcard .nm{font-family:var(--serif);font-size:15.5px;font-weight:500}.mcard .cat2{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .mcard .ds{font-size:12px;color:var(--muted);line-height:1.55;margin:10px 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .pvrow{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto;padding-top:4px}
  .pv{font-family:var(--mono);font-size:9.5px;letter-spacing:.2px;padding:2px 7px;border-radius:99px;white-space:nowrap}
  .pv.hi{background:var(--good-soft);color:var(--good)}.pv.mid{background:var(--warn-soft);color:var(--warn)}.pv.lo{background:var(--surface-3);color:var(--muted)}.pv.gl{background:var(--info-soft);color:var(--info)}
  .qtag{margin-left:auto;font-family:var(--mono);font-size:9px;letter-spacing:.4px;text-transform:uppercase;color:var(--accent-2);background:var(--accent-soft);padding:2px 6px;border-radius:5px;white-space:nowrap}
  .emptybig{text-align:center;color:var(--faint);padding:60px 20px;font-size:13px}
  /* DRAWER (detail) */
  .backdrop{position:fixed;inset:0;background:rgba(20,17,12,.22);z-index:55;opacity:0;pointer-events:none;transition:.2s}.backdrop.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:540px;max-width:94vw;background:var(--surface);border-left:1px solid var(--border-2);z-index:60;transform:translateX(100%);transition:transform .24s cubic-bezier(.25,1,.5,1);display:flex;flex-direction:column;box-shadow:-10px 0 34px rgba(20,17,12,.10)}.drawer.open{transform:none}
  .dh{display:flex;align-items:flex-start;gap:12px;padding:20px 22px 16px;border-bottom:1px solid var(--border)}
  .dh .sw{width:44px;height:44px;border-radius:var(--r10);flex:0 0 auto;border:1px solid var(--border-2)}
  .dh .ic{width:44px;height:44px;border-radius:var(--r10);background:var(--surface-3);display:grid;place-items:center;flex:0 0 auto;color:var(--forest)}.dh .ic svg{width:21px;height:21px}
  .dh .nm{font-family:var(--serif);font-size:19px;font-weight:500}.dh .cat2{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .dh .x{margin-left:auto;color:var(--muted);width:30px;height:30px;border-radius:var(--r8);display:grid;place-items:center;flex:0 0 auto}.dh .x:hover{background:var(--surface-2)}
  .db{flex:1;overflow-y:auto;padding:20px 22px}
  .db .ds{font-size:13px;color:var(--fg-2);line-height:1.65}
  .sech{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:22px 0 12px;display:flex;align-items:baseline;gap:10px}.sech .ln{flex:1;height:1px;background:var(--border)}
  .pv-row{margin-bottom:13px}.pv-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}.pv-top .c{font-weight:600}.pv-top .p{font-family:var(--mono);font-weight:600;color:var(--forest)}
  .pv-track{height:9px;border-radius:5px;background:var(--surface-3);overflow:hidden}.pv-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--forest),var(--forest-2))}
  .pv-fill.gl{background:linear-gradient(90deg,var(--info),#5a9aa8)}
  .pv-src{font-size:10.5px;color:var(--faint);margin-top:4px;line-height:1.4}
  .nodata{font-size:12px;color:var(--muted);background:var(--surface-2);border-radius:var(--r8);padding:12px 14px;line-height:1.5}
  .qrow{display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:8px 0;border-bottom:1px dotted var(--border-2)}.qrow:last-child{border-bottom:none}
  .qrow .p{font-family:var(--mono);color:var(--forest);font-weight:600}.qrow .s{color:var(--muted)}
  .qempty{font-size:12px;color:var(--faint);padding:6px 0}
  .qaddbtn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent-2);margin-top:10px;cursor:pointer}
  .qform{margin-top:12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--r10);padding:14px;display:none;flex-direction:column;gap:10px}.qform.open{display:flex}
  .qform .row2{display:flex;gap:10px}.qform .row2>div{flex:1}
  .inp{width:100%;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r8);padding:9px 11px;font-size:12.5px}.inp:focus{outline:none;border-color:var(--border-3)}
  .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
  .seg{display:flex;gap:6px;flex-wrap:wrap}.seg button{font-size:11.5px;padding:7px 11px;border:1px solid var(--border-2);border-radius:var(--r8);color:var(--fg-2)}.seg button.on{background:var(--forest);color:#f1ece0;border-color:var(--forest)}
  .primary{background:var(--accent);color:#fff;font-weight:600;font-size:12.5px;padding:11px 16px;border-radius:var(--r8);width:100%}.primary:hover{background:var(--accent-2)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--forest-deep);color:#f1ece0;font-size:12.5px;padding:11px 18px;border-radius:99px;z-index:120;opacity:0;transition:.2s;pointer-events:none}.toast.show{opacity:1}
  @media(max-width:720px){.search{width:170px}.ttl{font-size:17px}}
</style>
</head>
<body>
<div id="login"><div class="lcard"><div class="lmark"><svg width="22" height="22" viewBox="0 0 32 32"><path d="M7 18 L16 10 L25 18 L25 25 L7 25 Z" fill="#f7f0df"/></svg></div><div class="lword">Sora</div><div class="lsub">Casas · Operaciones</div>
  <input id="pass" type="password" placeholder="Código de acceso" autocomplete="off"><button onclick="doLogin()">Entrar</button><div class="lerr" id="lerr"></div><div class="lhint">Acceso interno del equipo</div></div></div>

<div id="app">
  <div class="topbar"><div class="topbar-in">
    <a class="back" href="sorainternalresources.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg><span>Operaciones</span></a>
    <div class="brandmark"><svg width="15" height="15" viewBox="0 0 32 32"><path d="M7 18 L16 10 L25 18 L25 25 L7 25 Z" fill="#f7f0df"/></svg></div>
    <div class="ttl">Enciclopedia de Materiales</div>
    <span class="i18nslot" id="langSlot"></span>
    <div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input id="search" placeholder="Buscar…" oninput="renderGrid()"></div>
  </div></div>
  <div class="filterbar"><div class="filterbar-in">
    <div class="tabs" id="matKindTabs"></div>
    <div class="tabs" id="matSubTabs"></div>
  </div></div>
  <div class="content">
    <div class="hero"><h1>26 materiales <em>de todo el mundo</em></h1><p id="matSub"></p></div>
    <div class="mgrid" id="matGrid"></div>
  </div>
</div>

<div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>

<script src="materials-encyclopedia-data.js"></script>
<script>
/* ===== ICONS ===== */
const I={box:'<path d="M3 7.5 12 3l9 4.5v9L12 21l-9-4.5Z"/><path d="M3 7.5 12 12l9-4.5"/>',plus:'<path d="M12 5v14M5 12h14"/>',x:'<path d="M6 6l12 12M18 6 6 18"/>',chl:'<path d="M15 5l-7 7 7 7"/>',search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>'};
function ic(n){return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${I[n]||''}</svg>`}
const $=s=>document.querySelector(s);
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

/* ===== SUPABASE / DATA LAYER (same shape as sorainternalresources.html) ===== */
let SUPA=(()=>{try{return JSON.parse(localStorage.getItem('sora.supa')||'null')}catch(_){return null}})();
let sb=null;
function connectSupa(){if(SUPA&&SUPA.url&&SUPA.anon&&window.supabase){try{sb=window.supabase.createClient(SUPA.url,SUPA.anon);}catch(e){sb=null;}}}
function lsGet(k,d){try{const v=JSON.parse(localStorage.getItem(k));return v==null?d:v}catch(_){return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(_){}}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
const QUOTES=new Map();
async function loadAllQuotes(){
  if(sb){
    try{
      const{data,error}=await sb.from('material_quotes').select('*').order('quote_date',{ascending:false});
      if(error)throw error;
      QUOTES.clear();(data||[]).forEach(q=>{if(!QUOTES.has(q.material_slug))QUOTES.set(q.material_slug,[]);QUOTES.get(q.material_slug).push(q)});
      return;
    }catch(e){console.warn('Quotes load falló, modo local:',e.message);}
  }
  const local=lsGet('sora.quotes',{});QUOTES.clear();Object.entries(local).forEach(([k,v])=>QUOTES.set(k,v));
}
async function addQuote(slug,q){
  q={material_slug:slug,quote_date:q.quote_date||ymd(new Date()),...q};
  if(sb){
    try{const{error}=await sb.from('material_quotes').insert(q);if(error)throw error;}
    catch(e){console.warn('Quote insert falló, guardando local:',e.message);const local=lsGet('sora.quotes',{});(local[slug]=local[slug]||[]).unshift(q);lsSet('sora.quotes',local);}
  }else{
    const local=lsGet('sora.quotes',{});(local[slug]=local[slug]||[]).unshift(q);lsSet('sora.quotes',local);
  }
  if(!QUOTES.has(slug))QUOTES.set(slug,[]);QUOTES.get(slug).unshift(q);
}

/* ===== MATERIALS ===== */
const MCATS=['Estructura','Acabados'];
const MSUBCATS={Estructura:['Muros','Marco'],Acabados:['Techo','Piso','Envolvente','Ventanas/Puertas']};
const curLang=()=>(window.SoraI18N&&window.SoraI18N.lang)||'es';
const escAttr=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const COUNTRY_NAMES={PA:{es:'Panamá',en:'Panama'},PE:{es:'Perú',en:'Peru'},CR:{es:'Costa Rica',en:'Costa Rica'},CO:{es:'Colombia',en:'Colombia'},EC:{es:'Ecuador',en:'Ecuador'},US:{es:'EE.UU.',en:'US'}};
function pvClass(pct){return pct>=40?'hi':pct>=10?'mid':'lo'}
let matKind='todos',matSub='todas';
function matKindTab(k){matKind=k;matSub='todas';renderGrid()}
function matSubTab(s){matSub=s;renderGrid()}

function renderGrid(){
  const all=window.SORA_MATERIALS||[];
  const totalQuotes=Array.from(QUOTES.values()).reduce((s,a)=>s+a.length,0);
  $('#matSub').textContent=all.length+' materiales · '+totalQuotes+' cotizaciones registradas';
  $('#matKindTabs').innerHTML=['todos',...MCATS].map(k=>{
    const label=k==='todos'?'Todos':k;const n=k==='todos'?all.length:all.filter(m=>m.category===k).length;
    return `<button class="tab ${matKind===k?'on':''}" onclick="matKindTab('${k}')">${label} <span class="n">${n}</span></button>`;
  }).join('');
  const subcats=(matKind!=='todos'&&MSUBCATS[matKind])?MSUBCATS[matKind]:[];
  $('#matSubTabs').innerHTML=subcats.length?['todas',...subcats].map(s=>{
    const label=s==='todas'?'Todas':s;const n=s==='todas'?all.filter(m=>m.category===matKind).length:all.filter(m=>m.category===matKind&&m.subcategory===s).length;
    return `<button class="tab ${matSub===s?'on':''}" onclick="matSubTab('${s}')">${label} <span class="n">${n}</span></button>`;
  }).join(''):'';
  let list=all.filter(m=>matKind==='todos'||m.category===matKind);
  if(matSub!=='todas')list=list.filter(m=>m.subcategory===matSub);
  const q=($('#search').value||'').toLowerCase();
  if(q)list=list.filter(m=>((m.name.es+m.name.en+m.desc.es+m.desc.en)||'').toLowerCase().includes(q));
  const cl=curLang();
  const cname=c=>(COUNTRY_NAMES[c]&&COUNTRY_NAMES[c][cl])||c;
  $('#matGrid').innerHTML=list.length?list.map(m=>{
    const swatch=m.swatches&&m.swatches[0]?`<div class="sw" style="background:${m.swatches[0]}"></div>`:`<div class="ic">${ic('box')}</div>`;
    const pvBadges=(m.prevalence||[]).filter(p=>p.pct!=null).slice(0,2).map(p=>`<span class="pv ${pvClass(p.pct)}">${cname(p.country)} ${p.pct}%</span>`).join('');
    const glBadge=(m.globalPct&&m.globalPct.value!=null)?`<span class="pv gl">Global ${m.globalPct.value}%</span>`:'';
    const noData=(!pvBadges&&!glBadge)?`<span class="pv lo">Sin dato de prevalencia</span>`:'';
    const hasQuotes=m.soraMarkets&&m.soraMarkets.length;
    const nm=(cl==='es'?m.name.es:m.name.en),ds=(cl==='es'?m.desc.es:m.desc.en);
    return `<button class="mcard" onclick="openDetail('${m.slug}')">
      <div class="mh">${swatch}<div><div class="nm">${nm}</div><div class="cat2">${m.subcategory}</div></div></div>
      <div class="ds">${ds}</div>
      <div class="pvrow">${pvBadges}${glBadge}${noData}${hasQuotes?`<span class="qtag">${ic('box')} ${(QUOTES.get(m.slug)||[]).length} cotización${(QUOTES.get(m.slug)||[]).length===1?'':'es'}</span>`:''}</div>
    </button>`;
  }).join(''):'<div class="emptybig">Sin materiales en esta categoría</div>';
}

/* ===== DETAIL DRAWER ===== */
let quickSlug=null;
function openDrawer(){$('#drawer').classList.add('open');$('#backdrop').classList.add('open')}
function closeDrawer(){$('#drawer').classList.remove('open');$('#backdrop').classList.remove('open')}
function openDetail(slug){
  quickSlug=slug;
  renderDetail();
  openDrawer();
}
function renderDetail(){
  const m=(window.SORA_MATERIALS||[]).find(x=>x.slug===quickSlug);if(!m)return;
  const cl=curLang();
  const cname=c=>(COUNTRY_NAMES[c]&&COUNTRY_NAMES[c][cl])||c;
  const nm=(cl==='es'?m.name.es:m.name.en),ds=(cl==='es'?m.desc.es:m.desc.en);
  const swatch=m.swatches&&m.swatches[0]?`<div class="sw" style="background:${m.swatches[0]}"></div>`:`<div class="ic">${ic('box')}</div>`;
  const prevBars=(m.prevalence||[]).filter(p=>p.pct!=null).map(p=>`
    <div class="pv-row"><div class="pv-top"><span class="c">${cname(p.country)}</span><span class="p">${p.pct}%</span></div>
    <div class="pv-track"><div class="pv-fill" style="width:${Math.min(100,p.pct)}%"></div></div>
    <div class="pv-src">${escAttr((p.source||'')+(p.year?' · '+p.year:''))}</div></div>`).join('');
  const glBar=(m.globalPct&&m.globalPct.value!=null)?`
    <div class="pv-row"><div class="pv-top"><span class="c">Global</span><span class="p">${m.globalPct.value}%</span></div>
    <div class="pv-track"><div class="pv-fill gl" style="width:${Math.min(100,m.globalPct.value)}%"></div></div>
    <div class="pv-src">${escAttr((m.globalPct.source||'')+(m.globalPct.year?' · '+m.globalPct.year:''))}</div></div>`:'';
  const noPrev=(!prevBars&&!glBar)?`<div class="nodata">Sin cifra de prevalencia confiable encontrada aún para este material.</div>`:'';
  const hasQuotes=m.soraMarkets&&m.soraMarkets.length;
  const rows=QUOTES.get(m.slug)||[];
  const quotesSection=hasQuotes?`
    <div class="sech"><span>Cotizaciones</span><div class="ln"></div></div>
    ${rows.length?rows.map(qq=>`<div class="qrow"><span class="s">${qq.quote_date} · ${qq.supplier||'—'}${qq.region?' · '+qq.region:''}</span><span class="p">$${(+qq.price).toLocaleString('en-US')}/${qq.unit}</span></div>`).join(''):'<div class="qempty">Sin cotizaciones aún</div>'}
    <div class="qaddbtn" onclick="toggleQform()">${ic('plus')} Agregar cotización</div>
    <div class="qform" id="qform">
      <div class="row2"><div><label class="lbl">Precio (USD)</label><input class="inp mono" id="qPrice2" placeholder="12.50"></div><div><label class="lbl">Unidad</label><input class="inp" id="qUnit" placeholder="m2, saco, unidad…"></div></div>
      <div><label class="lbl">Proveedor</label><input class="inp" id="qSupplier" placeholder="Nombre del proveedor"></div>
      <div class="row2"><div><label class="lbl">Región / mercado</label><input class="inp" id="qRegion" placeholder="Boquete…"></div><div><label class="lbl">Cotizado por</label><div class="seg" id="qSeg">${['Abraham','Yendri'].map((s,i)=>`<button class="${i===0?'on':''}" onclick="segPick(this)">${s}</button>`).join('')}</div></div></div>
      <div><label class="lbl">Confirmado por (contacto del proveedor)</label><input class="inp" id="qConfirmedBy" placeholder="Nombre de quien confirmó"></div>
      <div><label class="lbl">Notas</label><input class="inp" id="qNotes" placeholder="Opcional"></div>
      <button class="primary" onclick="saveQuote()">Agregar</button>
    </div>`:'';
  $('#drawer').innerHTML=`<div class="dh">${swatch}<div><div class="nm">${nm}</div><div class="cat2">${m.subcategory}</div></div><button class="x" onclick="closeDrawer()">${ic('x')}</button></div>
    <div class="db">
      <div class="ds">${ds}</div>
      <div class="sech"><span>Dónde es común</span><div class="ln"></div></div>
      ${prevBars}${glBar}${noPrev}
      ${quotesSection}
    </div>`;
}
function toggleQform(){const f=$('#qform');if(f)f.classList.toggle('open')}
function segPick(b){b.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}
function saveQuote(){
  const price=parseFloat(($('#qPrice2').value||'').replace(/[^0-9.]/g,''));const unit=$('#qUnit').value.trim();
  if(!price||!unit){toast('Faltan precio o unidad');return}
  const seg=$('#qSeg').querySelector('.on');
  const q={price,unit,supplier:$('#qSupplier').value.trim(),region:$('#qRegion').value.trim(),country:'PA',quoted_by:seg?seg.textContent:'Abraham',confirmed_by:$('#qConfirmedBy').value.trim(),notes:$('#qNotes').value.trim()};
  addQuote(quickSlug,q).then(()=>{renderDetail();renderGrid();toast('Cotización agregada')});
}

/* ===== LOGIN / BOOT ===== */
const TEAM_PASS='sora2026';
function doLogin(){const v=$('#pass').value.trim();if(v===TEAM_PASS){sessionStorage.setItem('sora.team','1');boot();}else{$('#lerr').textContent='Código incorrecto. Intenta de nuevo.';$('#pass').value='';}}
async function boot(){
  $('#login').classList.add('hide');$('#app').classList.add('show');
  connectSupa();
  await loadAllQuotes();
  renderGrid();
}
$('#pass')&&$('#pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});
if(sessionStorage.getItem('sora.team'))boot();else $('#pass').focus();
</script>
