<style>
  :root{

  *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}

  .twoup{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}@media(max-width:900px){.twoup{grid-template-columns:1fr}}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r10);overflow:hidden}.panel .ph{display:flex;align-items:center;gap:8px;padding:12px 15px;border-bottom:1px solid var(--border)}.panel .ph h4{font-size:12.5px;font-weight:600}.panel .ph .c{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .row{display:flex;align-items:center;gap:11px;padding:10px 15px;border-bottom:1px solid var(--border)}.row:last-child{border-bottom:none}.dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}.row .t{font-size:12.5px;font-weight:500}.row .s{font-size:11px;color:var(--muted)}.row .meta{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--muted);white-space:nowrap}.row.empty{color:var(--faint);justify-content:center;font-size:12px;padding:22px}
  .pill{font-family:var(--mono);font-size:9.5px;letter-spacing:.4px;padding:2px 7px;border-radius:99px;white-space:nowrap}.pill.sla{background:var(--accent-soft);color:var(--accent-2)}

/* ===== SUPABASE / DATA LAYER ===== */
let SUPA=(()=>{try{return JSON.parse(localStorage.getItem('sora.supa')||'null')}catch(_){return null}})();
let sb=null,MODE='local';
function connectSupa(){if(SUPA&&SUPA.url&&SUPA.anon&&window.supabase){try{sb=window.supabase.createClient(SUPA.url,SUPA.anon);MODE='supabase';}catch(e){sb=null;MODE='local';}}}
function lsGet(k,d){try{const v=JSON.parse(localStorage.getItem(k));return v==null?d:v}catch(_){return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(_){}}
const KEYMAP={prospects:'sora.prospects',events:'sora.cal',crm:'sora.crm',manual:'sora.manualLeads'};
const DB={
  async load(){
    if(sb){try{const{data,error}=await sb.from('sora_state').select('id,payload');if(error)throw error;const m={};(data||[]).forEach(r=>m[r.id]=r.payload);return m;}catch(e){console.warn('Supabase load falló, modo local:',e.message);MODE='local';sb=null;}}
    return {prospects:lsGet(KEYMAP.prospects,null),events:lsGet(KEYMAP.events,null),crm:lsGet(KEYMAP.crm,{}),manual:lsGet(KEYMAP.manual,[])};
  },
  async save(id,payload){lsSet(KEYMAP[id],payload);if(sb){try{await sb.from('sora_state').upsert({id,payload,updated_at:new Date().toISOString()});}catch(e){console.warn('Supabase save falló:',e.message);}}}
};

/* ===== MATERIAL QUOTES · separate from DB on purpose =====
   material_quotes is a real, growing, multi-row table (one row per confirmed
   supplier quote), not a single JSON blob — routing it through DB.save()
   would mean re-uploading the entire quote history on every add. This mirrors
   DB's exact connect/fallback shape (same sb/MODE globals) but reads/writes
   material_quotes directly. */
const QUOTES=new Map(); // slug -> array of quote rows, newest first
async function loadAllQuotes(){
  if(sb){
    try{
      const{data,error}=await sb.from('material_quotes').select('*').order('quote_date',{ascending:false});
      if(error)throw error;
      QUOTES.clear();(data||[]).forEach(q=>{if(!QUOTES.has(q.material_slug))QUOTES.set(q.material_slug,[]);QUOTES.get(q.material_slug).push(q)});
      return;
    }catch(e){console.warn('Quotes load falló, modo local:',e.message);}
  }
  const local=lsGet('sora.quotes',{});QUOTES.clear();Object.entries(local).forEach(([k,v])=>QUOTES.set(k,v));
}
async function addQuote(slug,q){
  q={material_slug:slug,quote_date:q.quote_date||ymd(new Date()),...q};
  if(sb){
    try{const{error}=await sb.from('material_quotes').insert(q);if(error)throw error;}
    catch(e){console.warn('Quote insert falló, guardando local:',e.message);const local=lsGet('sora.quotes',{});(local[slug]=local[slug]||[]).unshift(q);lsSet('sora.quotes',local);}
  }else{
    const local=lsGet('sora.quotes',{});(local[slug]=local[slug]||[]).unshift(q);lsSet('sora.quotes',local);
  }
  if(!QUOTES.has(slug))QUOTES.set(slug,[]);QUOTES.get(slug).unshift(q);
}

  for(let i=0;i<42;i++){let dn,mo,out=false;if(i<start){dn=prevDim-start+i+1;mo=-1;out=true}else if(i>=start+dim){dn=i-start-dim+1;mo=1;out=true}else{dn=i-start+1;mo=0}
    const d=new Date(calRef.getFullYear(),calRef.getMonth()+mo,dn),key=ymd(d),evs=EVENTS.filter(e=>e.date===key).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    cells+=`<button class="day ${out?'out':''} ${key===today?'today':''}" onclick="dayClick('${key}')"><span class="dn">${dn}</span>${evs.slice(0,3).map(e=>`<span class="ev ${e.type}">${e.time?e.time+' ':''}${e.title.replace(/·.*/,'').trim()}</span>`).join('')}${evs.length>3?`<span style="font-size:9.5px;color:var(--muted)">+${evs.length-3} más</span>`:''}</button>`;}
  $('#cal').innerHTML=cells;
}
