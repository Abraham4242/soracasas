<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="0.7" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#f4d68a" stop-opacity="1"/>
      <stop offset="40%" stop-color="#e07a5f" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a1812" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbf6e8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fbf6e8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- background sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- sun -->
  <circle cx="860" cy="220" r="60" fill="#f6d68a"/>
  <!-- stars -->
  <g fill="#fbf6e8" opacity="0.8">
    <circle cx="120" cy="80" r="1.5"/>
    <circle cx="320" cy="140" r="1.2"/>
    <circle cx="480" cy="60" r="1.8"/>
    <circle cx="640" cy="120" r="1.3"/>
    <circle cx="200" cy="180" r="1.5"/>
    <circle cx="1080" cy="80" r="1.6"/>
    <circle cx="1140" cy="160" r="1.2"/>
  </g>
  <!-- back mountains -->
  <path d="M0 480 L120 380 L240 420 L360 360 L480 410 L600 340 L720 400 L840 350 L960 400 L1080 360 L1200 400 L1200 630 L0 630 Z" fill="#0e1f15" opacity="0.85"/>
  <!-- mist band -->
  <rect x="0" y="430" width="1200" height="80" fill="url(#mist)"/>
  <!-- front mountains -->
  <path d="M0 530 L160 480 L320 510 L480 470 L640 510 L800 480 L960 510 L1120 490 L1200 510 L1200 630 L0 630 Z" fill="#000" opacity="0.55"/>
  <!-- SORA wordmark -->
  <text x="600" y="320" text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-size="200" font-weight="300"
        letter-spacing="60"
        fill="#fbf6e8"
        style="text-shadow: 0 4px 30px rgba(0,0,0,0.4)">SORA</text>
  <!-- Travel Agency subline -->
  <text x="600" y="380" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="22" font-weight="700"
        letter-spacing="14"
        fill="#d4b87a">TRAVEL AGENCY</text>
  <!-- tagline -->
  <text x="600" y="450" text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-style="italic" font-weight="400"
        font-size="30"
        fill="rgba(251,246,232,0.78)">Fines de semana memorables · Latinoamérica</text>
  <!-- La Compañía signature -->
  <text x="600" y="595" text-anchor="middle"
        font-family="Inter, sans-serif"
        font-size="14" font-weight="600"
        letter-spacing="6"
        fill="rgba(251,246,232,0.45)">LA COMPAÑÍA · MMXXVI</text>
</svg>
